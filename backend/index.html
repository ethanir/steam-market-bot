<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steam Market Bot</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e17; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const API = "";

    const T = {
      bg: "#0a0e17", surface: "#111827", surfaceHover: "#1a2235",
      border: "#1e293b", borderLight: "#2d3a4f",
      accent: "#3b82f6", accentGlow: "rgba(59,130,246,0.15)",
      green: "#22c55e", greenGlow: "rgba(34,197,94,0.15)",
      red: "#ef4444", redGlow: "rgba(239,68,68,0.15)",
      yellow: "#eab308", text: "#e2e8f0", textMuted: "#64748b", textDim: "#475569",
    };

    function StatusBadge({ running }) {
      return (
        <span style={{
          display:"inline-flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:600,
          letterSpacing:"0.05em",textTransform:"uppercase",
          background:running?T.greenGlow:T.redGlow,color:running?T.green:T.red,
          border:`1px solid ${running?T.green+"33":T.red+"33"}`,
        }}>
          <span style={{width:7,height:7,borderRadius:"50%",background:running?T.green:T.red,
            boxShadow:running?`0 0 8px ${T.green}`:"none",animation:running?"pulse 2s infinite":"none"}}/>
          {running?"Running":"Stopped"}
        </span>
      );
    }

    function StatCard({label,value,color=T.text}) {
      return (
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"16px 20px",flex:1,minWidth:120}}>
          <div style={{fontSize:11,color:T.textMuted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>{label}</div>
          <div style={{fontSize:24,fontWeight:700,color,fontFamily:"'JetBrains Mono',monospace"}}>{value}</div>
        </div>
      );
    }

    function SkinCard({skin,index,onDelete}) {
      const parts = skin.url.split("/");
      const name = decodeURIComponent(parts[parts.length-1]||"Unknown").replace(/%20/g," ");
      return (
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:16,display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:36,height:36,borderRadius:8,background:`linear-gradient(135deg,${T.accent}22,${T.accent}44)`,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:T.accent,flexShrink:0}}>
            {index+1}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
            <div style={{display:"flex",gap:12,marginTop:4,fontSize:12,color:T.textMuted}}>
              {skin.float_threshold!=null&&<span>Float: <span style={{color:T.yellow}}>{skin.float_threshold}</span></span>}
              {skin.max_price!=null&&<span>Max: <span style={{color:T.green}}>${skin.max_price}</span></span>}
              {skin.pattern&&<span>Pattern: <span style={{color:T.accent}}>{skin.pattern}</span></span>}
            </div>
          </div>
          <button onClick={()=>onDelete(index)} style={{background:"none",border:"none",color:T.textDim,cursor:"pointer",padding:6,borderRadius:6,fontSize:18,lineHeight:1}}
            onMouseEnter={e=>e.target.style.color=T.red} onMouseLeave={e=>e.target.style.color=T.textDim}>×</button>
        </div>
      );
    }

    function LogViewer({logs}) {
      const ref = useRef(null);
      useEffect(()=>{ref.current?.scrollIntoView({behavior:"smooth"})},[logs]);
      return (
        <div style={{background:"#080b11",border:`1px solid ${T.border}`,borderRadius:10,padding:14,height:260,overflowY:"auto",
          fontFamily:"'JetBrains Mono',monospace",fontSize:11.5,lineHeight:1.7,color:T.textMuted}}>
          {logs.length===0&&<div style={{color:T.textDim,fontStyle:"italic"}}>No logs yet. Start the bot to see activity.</div>}
          {logs.map((log,i)=>(
            <div key={i} style={{color:log.includes("BUY")?T.green:log.includes("ERROR")||log.includes("stuck")?T.red:
              log.includes("CYCLE")||log.includes("started")?T.accent:T.textMuted}}>{log}</div>
          ))}
          <div ref={ref}/>
        </div>
      );
    }

    function App() {
      const [skins,setSkins]=useState([]);
      const [settings,setSettings]=useState({max_pages:6,cycle_cooldown:15,page_delay_min:3,page_delay_max:5,skin_delay_min:3,skin_delay_max:5,float_mode:"over"});
      const [status,setStatus]=useState({running:false,current_skin:0,total_skins:0,current_page:0,orders_executed:0,balance:"0",cycle_count:0});
      const [logs,setLogs]=useState([]);
      const [tab,setTab]=useState("dashboard");
      const [newSkin,setNewSkin]=useState({url:"",float_threshold:"",max_price:"",pattern:""});
      const [connected,setConnected]=useState(false);
      const ws=useRef(null);

      useEffect(()=>{
        fetch(`${API}/api/skins`).then(r=>r.json()).then(setSkins).catch(()=>{});
        fetch(`${API}/api/settings`).then(r=>r.json()).then(setSettings).catch(()=>{});
        fetch(`${API}/api/logs`).then(r=>r.json()).then(setLogs).catch(()=>{});
      },[]);

      useEffect(()=>{
        function connect(){
          const proto=location.protocol==="https:"?"wss:":"ws:";
          ws.current=new WebSocket(`${proto}//${location.host}/ws`);
          ws.current.onopen=()=>setConnected(true);
          ws.current.onclose=()=>{setConnected(false);setTimeout(connect,3000)};
          ws.current.onmessage=(e)=>{
            const d=JSON.parse(e.data);
            if(d.type==="log")setLogs(p=>[...p.slice(-499),d.message]);
            else if(d.type==="status"){const{type,...rest}=d;setStatus(rest)}
          };
        }
        connect();
        return()=>ws.current?.close();
      },[]);

      const startBot=()=>fetch(`${API}/api/bot/start`,{method:"POST"}).then(r=>r.json()).then(d=>{if(d.ok)setStatus(s=>({...s,running:true}))});
      const stopBot=()=>fetch(`${API}/api/bot/stop`,{method:"POST"}).then(r=>r.json()).then(d=>{if(d.ok)setStatus(s=>({...s,running:false}))});

      const addSkin=()=>{
        if(!newSkin.url)return;
        const skin={url:newSkin.url,float_threshold:newSkin.float_threshold?parseFloat(newSkin.float_threshold):null,
          max_price:newSkin.max_price?parseFloat(newSkin.max_price):null,pattern:newSkin.pattern||null,number_of_stickers:null,pages:null};
        fetch(`${API}/api/skins`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(skin)})
          .then(r=>r.json()).then(()=>{setSkins(p=>[...p,skin]);setNewSkin({url:"",float_threshold:"",max_price:"",pattern:""})});
      };

      const deleteSkin=(i)=>fetch(`${API}/api/skins/${i}`,{method:"DELETE"}).then(r=>r.json()).then(()=>setSkins(p=>p.filter((_,j)=>j!==i)));

      const saveSettings=()=>fetch(`${API}/api/settings`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(settings)});

      const I={background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 14px",color:T.text,fontSize:13,outline:"none",width:"100%",
        boxSizing:"border-box",fontFamily:"'JetBrains Mono',monospace"};
      const B=(c,f=true)=>({background:f?c:"transparent",color:f?"#fff":c,border:f?"none":`1px solid ${c}`,
        borderRadius:8,padding:"10px 24px",fontSize:13,fontWeight:600,cursor:"pointer",letterSpacing:"0.02em"});

      return (
        <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'Inter',-apple-system,sans-serif"}}>
          {/* HEADER */}
          <div style={{borderBottom:`1px solid ${T.border}`,padding:"16px 32px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${T.accent},#8b5cf6)`,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#fff"}}>S</div>
              <div>
                <div style={{fontSize:15,fontWeight:700,letterSpacing:"-0.01em"}}>Steam Market Bot</div>
                <div style={{fontSize:11,color:T.textMuted}}>{connected?"Connected":"Disconnected"} · v1.0</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <StatusBadge running={status.running}/>
              {status.running?<button onClick={stopBot} style={B(T.red)}>Stop</button>:<button onClick={startBot} style={B(T.green)}>Start Bot</button>}
            </div>
          </div>

          {/* TABS */}
          <div style={{borderBottom:`1px solid ${T.border}`,padding:"0 32px",display:"flex",gap:0}}>
            {["dashboard","skins","settings"].map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{background:"none",border:"none",color:tab===t?T.accent:T.textMuted,
                padding:"14px 20px",fontSize:13,fontWeight:600,cursor:"pointer",
                borderBottom:tab===t?`2px solid ${T.accent}`:"2px solid transparent",textTransform:"capitalize",letterSpacing:"0.02em"}}>
                {t}
              </button>
            ))}
          </div>

          {/* CONTENT */}
          <div style={{padding:"24px 32px",maxWidth:900,margin:"0 auto"}}>
            {tab==="dashboard"&&(
              <div style={{display:"flex",flexDirection:"column",gap:20}}>
                <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
                  <StatCard label="Balance" value={`$${status.balance}`} color={T.green}/>
                  <StatCard label="Orders" value={status.orders_executed} color={T.accent}/>
                  <StatCard label="Cycle" value={status.cycle_count}/>
                  <StatCard label="Scanning" value={status.running?`${status.current_skin}/${status.total_skins}`:"—"} color={T.yellow}/>
                </div>
                {status.running&&(
                  <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:16}}>
                    <div style={{fontSize:12,color:T.textMuted,marginBottom:8}}>Current Progress</div>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{flex:1,height:6,background:T.bg,borderRadius:3,overflow:"hidden"}}>
                        <div style={{width:`${status.total_skins>0?(status.current_skin/status.total_skins)*100:0}%`,
                          height:"100%",background:`linear-gradient(90deg,${T.accent},#8b5cf6)`,borderRadius:3,transition:"width 0.5s"}}/>
                      </div>
                      <span style={{fontSize:12,color:T.textMuted,fontFamily:"'JetBrains Mono',monospace"}}>Page {status.current_page}</span>
                    </div>
                  </div>
                )}
                <div>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:10,color:T.textMuted}}>Live Log</div>
                  <LogViewer logs={logs}/>
                </div>
              </div>
            )}

            {tab==="skins"&&(
              <div style={{display:"flex",flexDirection:"column",gap:20}}>
                <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:20}}>
                  <div style={{fontSize:14,fontWeight:600,marginBottom:14}}>Add Skin</div>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    <input value={newSkin.url} onChange={e=>setNewSkin(s=>({...s,url:e.target.value}))} placeholder="Steam Market URL" style={I}/>
                    <div style={{display:"flex",gap:10}}>
                      <input value={newSkin.float_threshold} onChange={e=>setNewSkin(s=>({...s,float_threshold:e.target.value}))} placeholder="Float threshold" style={I}/>
                      <input value={newSkin.max_price} onChange={e=>setNewSkin(s=>({...s,max_price:e.target.value}))} placeholder="Max price ($)" style={I}/>
                      <input value={newSkin.pattern} onChange={e=>setNewSkin(s=>({...s,pattern:e.target.value}))} placeholder="Pattern (optional)" style={I}/>
                    </div>
                    <button onClick={addSkin} style={{...B(T.accent),alignSelf:"flex-end"}}>Add Skin</button>
                  </div>
                </div>

                <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:13,fontWeight:600}}>Float Mode</span>
                  <div style={{display:"flex",gap:0,borderRadius:8,overflow:"hidden",border:`1px solid ${T.border}`}}>
                    {["over","under"].map(m=>(
                      <button key={m} onClick={()=>{const s={...settings,float_mode:m};setSettings(s);
                        fetch(`${API}/api/settings`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(s)})}}
                        style={{background:settings.float_mode===m?T.accent:T.bg,color:settings.float_mode===m?"#fff":T.textMuted,
                          border:"none",padding:"8px 20px",fontSize:12,fontWeight:600,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.05em"}}>
                        {m}
                      </button>
                    ))}
                  </div>
                </div>

                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <div style={{fontSize:13,fontWeight:600,color:T.textMuted}}>{skins.length} skin{skins.length!==1?"s":""} configured</div>
                  {skins.map((s,i)=><SkinCard key={i} skin={s} index={i} onDelete={deleteSkin}/>)}
                  {skins.length===0&&(
                    <div style={{background:T.surface,border:`1px dashed ${T.border}`,borderRadius:10,padding:40,textAlign:"center",color:T.textDim,fontSize:13}}>
                      No skins added yet. Add one above to get started.
                    </div>
                  )}
                </div>
              </div>
            )}

            {tab==="settings"&&(
              <div style={{display:"flex",flexDirection:"column",gap:16}}>
                <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:20,display:"flex",flexDirection:"column",gap:18}}>
                  <div style={{fontSize:14,fontWeight:600}}>Bot Configuration</div>
                  <div style={{display:"flex",gap:16}}>
                    <div style={{flex:1}}>
                      <label style={{fontSize:11,color:T.textMuted,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Max Pages</label>
                      <input type="number" value={settings.max_pages} onChange={e=>setSettings(s=>({...s,max_pages:parseInt(e.target.value)||1}))} style={I}/>
                    </div>
                    <div style={{flex:1}}>
                      <label style={{fontSize:11,color:T.textMuted,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Cycle Cooldown (s)</label>
                      <input type="number" value={settings.cycle_cooldown} onChange={e=>setSettings(s=>({...s,cycle_cooldown:parseInt(e.target.value)||1}))} style={I}/>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:16}}>
                    <div style={{flex:1}}>
                      <label style={{fontSize:11,color:T.textMuted,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Page Delay Min (s)</label>
                      <input type="number" step="0.5" value={settings.page_delay_min} onChange={e=>setSettings(s=>({...s,page_delay_min:parseFloat(e.target.value)||1}))} style={I}/>
                    </div>
                    <div style={{flex:1}}>
                      <label style={{fontSize:11,color:T.textMuted,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Page Delay Max (s)</label>
                      <input type="number" step="0.5" value={settings.page_delay_max} onChange={e=>setSettings(s=>({...s,page_delay_max:parseFloat(e.target.value)||1}))} style={I}/>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:16}}>
                    <div style={{flex:1}}>
                      <label style={{fontSize:11,color:T.textMuted,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Skin Delay Min (s)</label>
                      <input type="number" step="0.5" value={settings.skin_delay_min} onChange={e=>setSettings(s=>({...s,skin_delay_min:parseFloat(e.target.value)||1}))} style={I}/>
                    </div>
                    <div style={{flex:1}}>
                      <label style={{fontSize:11,color:T.textMuted,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Skin Delay Max (s)</label>
                      <input type="number" step="0.5" value={settings.skin_delay_max} onChange={e=>setSettings(s=>({...s,skin_delay_max:parseFloat(e.target.value)||1}))} style={I}/>
                    </div>
                  </div>
                  <button onClick={saveSettings} style={{...B(T.accent),alignSelf:"flex-end"}}>Save Settings</button>
                </div>
                <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:20}}>
                  <div style={{fontSize:14,fontWeight:600,marginBottom:10}}>Export</div>
                  <div style={{fontSize:12,color:T.textMuted,marginBottom:14}}>Export current config as YAML for use with the terminal bot.</div>
                  <button onClick={()=>fetch(`${API}/api/export-yaml`).then(r=>r.json()).then(d=>{navigator.clipboard.writeText(d.yaml);alert("YAML copied!")})} style={B(T.textMuted,false)}>
                    Copy YAML Config
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
